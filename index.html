<!DOCTYPE html>
<html>
<head>
  <title>Opening WhatsApp...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    function openWhatsApp() {
      // 🔥 FORCES WHATSAPP APP OPEN (Android)
      window.location.href =
        "intent://chat.whatsapp.com/IP52diC7fuBGYSdvbnW2Tr#Intent;package=com.whatsapp;scheme=https;end";
    }

    window.onload = function () {
      setTimeout(openWhatsApp, 1000);
    };
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffffff;

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      text-align: center;
      padding: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .text {
      color: #222;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div>

    <h2>Opening WhatsApp...</h2>

    <p class="text">If it doesn't open automatically, tap below.</p>

    <a class="btn" href="intent://chat.whatsapp.com/IP52diC7fuBGYSdvbnW2Tr#Intent;package=com.whatsapp;scheme=https;end">
      Open Now
    </a>

  </div>

</body>
</html>
