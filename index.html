<!DOCTYPE html>
<html>
<head>
  <title>Opening Link...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    function openWhatsApp() {
      window.location.href = "https://chat.whatsapp.com/IP52diC7fuBGYSdvbnW2Tr";
    }

    window.onload = function () {
      setTimeout(function () {
        openWhatsApp();
      }, 1800); // under 2 seconds
    };
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffffff;

      display: flex;
      justify-content: center;

      /* slightly below center */
      align-items: flex-start;
      padding-top: 70px;
    }

    /* FULL BOX CONTAINER */
    .box {
      width: 90%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .small {
      margin-top: 15px;
      color: gray;
      font-size: 13px;
    }

    /* UNDERLINE STYLE */
    .underline {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- EVERYTHING INSIDE ONE BOX -->
  <div class="box">

    <h2>Opening link...</h2>

    <p>Your submission was successful.</p>

    <p>If your app or page doesn't open automatically, tap below:</p>

    <!-- CTA BUTTON -->
    <a class="btn" href="https://chat.whatsapp.com/IP52diC7fuBGYSdvbnW2Tr">
      OPEN NOW
    </a>

    <!-- UNDERLINED TEXT -->
    <p class="small underline">Continue in browser</p>

    <p class="small">Don’t close this tab while connecting you...</p>

  </div>

</body>
</html>
