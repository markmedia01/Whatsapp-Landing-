<!DOCTYPE html>

<head>

  <script>
    function openWhatsApp() {
      const groupLink = "https://chat.whatsapp.com/IP52diC7fuBGYSdvbnW2Tr";

      // Step 1: Try open WhatsApp app directly (best attempt)
      window.location.href = "whatsapp://chat?code=IP52diC7fuBGYSdvbnW2Tr";

      // Step 2: Fallback to group link if app open fails
      setTimeout(function () {
        window.location.href = groupLink;

    window.onload = function () {
      setTimeout(openWhatsApp, 600);
    };
  </script>
