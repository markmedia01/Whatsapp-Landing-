<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Link</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #111827;
      padding: 30px 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #22c55e;
    }

    p {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    a.button {
      display: inline-block;
      padding: 14px 20px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      width: 100%;
    }

    a.button:hover {
      background: #16a34a;
    }

    .small {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Opening Link</h1>

    <p>
      You are being redirected to our private WhatsApp group.<br>
      Click below to continue.
    </p>

    <a class="button" href="https://chat.whatsapp.com/IP52diC7fuBGYSdvbnW2Tr" target="_blank">
      Continue to WhatsApp
    </a>

    <div class="small">
      Secure access • Instant redirect
    </div>
  </div>

</body>
</html>
